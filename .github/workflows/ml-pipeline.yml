name: ML Training and Backtesting Pipeline
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Set up Python 3.9
      uses: actions/setup-python@v5
      with:
        python-version: 3.9
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Download Raw Data from Release
      run: |
        # Create the directory for the raw data
        mkdir -p RawData
        curl -L -o RawData/Dataset_NQ_1min_2022_2025.csv https://github.com/${{ github.repository }}/releases/download/v1.0-data/Dataset_NQ_1min_2022_2025.csv
    - name: "Step 1: Data Processing & Feature Engineering"
      run: python Data-Processing-Feature-Engineering-0.py
    - name: Upload Processed Data
      uses: actions/upload-artifact@v4
      with:
        name: processed-data
        path: processed_features.csv
    - name: "Step 2: Model Training"
      run: python Model-Training-1.py
    - name: Upload Training Results
      uses: actions/upload-artifact@v4
      with:
        name: training-results
        path: |
          chatgpt_rf_model.joblib
          scaler.gz
          actual_vs_predicted_prices.png
          feature_importance.png
          backtest_equity_curve.png
    - name: Remove backtest.py to reflect new unified script
      run: rm backtest.py
    - name: Final Artifacts (Legacy - can be removed if no other process needs it)
      uses: actions/upload-artifact@v4
      with:
        name: final-artifacts
        path: .
